name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Package app (DMG + zip)
        run: |
          VERSION="${GITHUB_REF_NAME#v}" script/package_release.sh

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
