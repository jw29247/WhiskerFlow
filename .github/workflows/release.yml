name: Package (verification only)

# CI has no Developer ID certificate, so it can only produce an ad-hoc
# (unsigned, un-notarized) build that Gatekeeper would block on download.
# This job therefore only verifies that packaging succeeds — it does NOT publish
# any release assets. The shareable, notarized DMG is produced locally with
# `script/notarize.sh` (see Distribution/SIGNING.md). To notarize in CI instead,
# add Developer ID + App Store Connect secrets and restore a publish step.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build packaging artifacts (unsigned — not published)
        run: |
          VERSION="${GITHUB_REF_NAME#v}" script/package_release.sh
